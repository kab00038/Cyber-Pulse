name = "cyber-pulse"
main = "src/worker.js"
compatibility_date = "2026-04-27"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "./public", binding = "ASSETS" }

[[d1_databases]]
binding = "DB"
database_name = "cyberpulse"
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"

[triggers]
crons = ["*/30 * * * *"]
